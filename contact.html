<!DOCTYPE html>
<html lang ="en">
<head>
<title>My Academics</title>
<meta charset="UTF-8">
<meta name = "description">
</head>

<body>

	<h1>Section 3: Contact Me (Task 6)</h1>

<main>
	<section id ="contact">
	<form action="#" method="post" style="background-color: #f9f9f9; padding: 15px; border: 2px solid #ccc;">
		<fieldset style="padding: 10px; border: 2px solid gray;">
			<legend>Personal Information</legend>
				<label for="fullname">Full Name: </label><br>
				<input 
					type="text" id ="fullname" name="fullname"
					style="border: 2px solid navy; padding: 6px; font-size: 14px;" 
					placeholder="Your full name" 
					required maxlength="60"> <br><br>
				<label for="email">Email:</label><br>
            	<input 
            		type="email" id="email" name="email"
                   	style="border: 2px solid green; padding: 6px;"
                   	placeholder="example@email.com" required><br><br>

            	<label for="phone">Phone Number:</label><br>
            	<input 
            		type="tel" id="phone" name="phone"
                   	style="border: 2px solid purple; padding: 6px;"
                   	placeholder="012-3456789" required><br><br>

            	<label for="age">Age:</label><br>
            	<input 
            		type="number" id="age" name="age"
                   	min="18" max="100"
                   	style="border: 2px solid orange; padding: 6px;"
                   	required><br><br>

            	<label for="date">Preferred Contact Date:</label><br>
            	<input 
            		type="date" id="date" name="date"
                   	style="padding: 6px;" required><br><br>

            	<label for="satisfaction">Satisfaction Level:</label><br>
            	<input 
            		type="range" id="satisfaction" name="satisfaction"
                   	min="1" max="10"
                   	style="width: 200px;"><br><br>
		</fieldset>

	  	<fieldset style="padding: 10px; border: 2px solid gray;">
	  		<legend style="font-size: 18px;">Message Details</legend>

            	<label for="subject">Subject:</label><br>
            	<select 
            		id="subject" name="subject"
                    style="padding: 6px; border: 2px solid black;" required>
                	<optgroup label="General">
                    	<option value="inquiry">General Inquiry</option>
                    	<option value="feedback">Feedback</option>
                	</optgroup>
                	<optgroup label="Work">
                	    <option value="collab">Collaboration</option>
                    	<option value="job">Job Opportunity</option>
                	</optgroup>
            	</select><br><br>

            <p>Preferred Contact Method:</p>
            	<input type="radio" id="email_contact" name="contact_method" value="email" required>
            	<label for="email_contact">Email</label>

            	<input type="radio" id="phone_contact" name="contact_method" value="phone">
            	<label for="phone_contact">Phone</label>

            	<input type="radio" id="whatsapp_contact" name="contact_method" value="whatsapp">
            	<label for="whatsapp_contact">WhatsApp</label><br><br>

            <p>Topics of Interest:</p>
            	<input type="checkbox" id="webdev" name="interest" value="webdev">
            	<label for="webdev">Web Development</label>

            	<input type="checkbox" id="design" name="interest" value="design">
            	<label for="design">UI/UX Design</label>

            	<input type="checkbox" id="data" name="interest" value="data">
            	<label for="data">Data Science</label><br><br>

            	<label for="message">Your Message:</label><br>
            		<textarea id="message" name="message"
                      rows="4" cols="40"
                      style="border: 2px solid black; padding: 6px;"
                      placeholder="Write your message here..." required maxlength="200"></textarea><br><br>
        </fieldset><br>

        <button type="submit"
                style="background-color: darkblue; color: white; padding: 10px; border: none; font-size: 16px;">
            Submit
        </button>
	</form>
</section>
</main>
</body>
</html>
